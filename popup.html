<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetBlock</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🚫</span>
      <span class="logo-text">BetBlock</span>
    </div>
    <label class="toggle" title="Ativar/desativar BetBlock">
      <input type="checkbox" id="toggleEnabled" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="statusBanner">
    <span id="statusText">Ativo — protegendo você</span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="countPage">0</div>
      <div class="stat-label">nesta página</div>
    </div>
    <div class="divider"></div>
    <div class="stat-card">
      <div class="stat-number" id="countTotal">0</div>
      <div class="stat-label">total na sessão</div>
    </div>
  </div>

  <div class="footer">
    <a id="linkReport" href="#" title="Reportar um site">Reportar site não coberto</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
